<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詞彙檢索系統</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 Vue.js 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@500&display=swap" rel="stylesheet">

    <style>
        body { font-family: "Noto Sans", sans-serif; }
        /* 導航連結的基礎樣式 */
        .nav-link {
            @apply text-gray-600 hover:text-indigo-600 font-medium px-3 py-2 rounded-lg transition duration-150 ease-in-out;
        }
        /* 導航連結的活躍樣式 */
        .nav-link-active {
            @apply bg-indigo-50 text-indigo-700 font-semibold shadow-inner;
        }
        /* 舊的 .language-card 樣式已被移除，
           並移至 HTML 元素上以確保在 CDN 環境下正確解析。
        */
    </style>
</head>
<body class="bg-gray-50">

<!-- 隱藏的元素：強制 Tailwind JIT 產生動態綁定所需的顏色類別 -->
<div class="hidden 
    bg-indigo-100 border-indigo-300 hover:shadow-indigo-300/50 text-indigo-700 
    bg-green-100 border-green-300 hover:shadow-green-300/50 text-green-700
    bg-red-100 border-red-300 hover:shadow-red-300/50 text-red-700
"></div>

<div id="app" class="min-h-screen text-gray-800">
    
    <!-- 標頭與導航列 (根據目前視圖調整) -->
    <header class="bg-white shadow-md sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            
            <!-- Title 標題 (左上角) -->
            <h1 class="text-3xl font-extrabold tracking-tight">
                <span :class="currentView === 'LanguageSelect' ? 'text-gray-700' : 'text-indigo-600'">
                    {{ headerTitle }}
                </span>
            </h1>
            
            <!-- Navigation 導航 (右上角) -->
            <nav class="flex space-x-4 sm:space-x-6">
                <!-- 返回首頁按鈕 -->
                <button 
                    v-if="currentView !== 'LanguageSelect'"
                    @click="currentView = 'LanguageSelect'; subPage = 'Search'"
                    class="nav-link bg-gray-100 text-gray-700 hover:bg-gray-200"
                >
                    <svg class="w-5 h-5 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    返回語言選擇
                </button>

                <!-- 語料庫內部導航 -->
                <template v-if="currentView === 'LexiconApp'">
                    <button 
                        @click="subPage = 'Lexicon'"
                        :class="{'nav-link-active': subPage === 'Lexicon'}"
                        class="nav-link"
                    >
                        IPA
                    </button>
                    <button 
                        @click="subPage = 'Pinyin'"
                        :class="{'nav-link-active': subPage === 'Pinyin'}"
                        class="nav-link"
                    >
                        Pinyin
                    </button>
                    <button 
                        @click="subPage = 'Categories'"
                        :class="{'nav-link-active': subPage === 'Categories'}"
                        class="nav-link"
                    >
                        語意範疇
                    </button>
                    <button 
                        @click="subPage = 'Search'"
                        :class="{'nav-link-active': subPage === 'Search'}"
                        class="nav-link"
                    >
                        搜尋
                    </button>
                </template>
            </nav>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- ============================================== -->
        <!-- 1. 語言選擇首頁 (LanguageSelect View) -->
        <!-- ============================================== -->
        <div v-if="currentView === 'LanguageSelect'" class="text-center">
            <h2 class="text-3xl font-bold text-gray-700 mb-2">歡迎使用多語言檢索系統</h2>
            <p class="text-xl text-gray-500 mb-10">請選擇您要檢索的語言：</p>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- 語言卡片列表 -->
                <div v-for="lang in availableLanguages" :key="lang.id">
                    <div 
                        :class="[
                            // 原本 .language-card 的樣式：確保基本樣式套用
                            'p-6 sm:p-8 rounded-xl shadow-lg transform hover:scale-[1.02] transition duration-300 ease-in-out cursor-pointer h-full flex flex-col justify-between',
                            // 動態顏色與邊框/陰影
                            lang.id === 'yongxing' 
                                ? `bg-${lang.color}-100 border border-${lang.color}-300 hover:shadow-xl hover:shadow-${lang.color}-300/50` 
                                : 'bg-gray-100 border border-gray-300 opacity-70 cursor-not-allowed'
                        ]"
                        @click="selectLanguage(lang)"
                    >
                        <h3 :class="['text-2xl font-bold mb-2', lang.id === 'yongxing' ? `text-${lang.color}-700` : 'text-gray-500']">{{ lang.name }}</h3>
                        <p class="text-gray-600 mb-4 flex-grow">{{ lang.description }}</p>
                        
                        <button 
                            :class="[
                                'px-4 py-2 font-semibold rounded-lg shadow-md transition duration-150 ease-in-out',
                                lang.id === 'yongxing' ? `bg-${lang.color}-600 text-white hover:bg-${lang.color}-700` : 'bg-gray-400 text-gray-700 cursor-not-allowed'
                            ]"
                            :disabled="lang.id !== 'yongxing'"
                        >
                            {{ lang.id === 'yongxing' ? '進入檢索頁面' : '即將推出' }}
                        </button>
                    </div>
                </div>
            </div>
        </div>


        <!-- ============================================== -->
        <!-- 2. 永興語詞彙檢索系統 (LexiconApp View) -->
        <!-- ============================================== -->
        <template v-if="currentView === 'LexiconApp'">
            <!-- 載入狀態 / 錯誤訊息 -->
            <template v-if="isLoading">
                <div class="text-center p-12 text-xl text-indigo-500">
                    資料載入中，請稍候...
                    <div class="mt-4 animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500 mx-auto"></div>
                </div>
            </template>
            <template v-else-if="error">
                <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded-md shadow-lg" role="alert">
                    <p class="font-bold">資料載入錯誤</p>
                    <p>無法從 CSV 連結獲取或解析資料。錯誤訊息: {{ error }}</p>
                </div>
            </template>
            <template v-else>
                <!-- Search 檢索頁面 -->
                <div v-if="subPage === 'Search'" class="bg-white p-6 sm:p-8 rounded-xl shadow-lg">
                    <h2 class="text-2xl font-semibold mb-6 text-gray-700">搜尋</h2>

                    <!-- 篩選條件輸入區 -->
                    <div class="flex flex-col sm:flex-row gap-4 mb-6 items-center">
                        
                        <!-- 欄位選擇下拉式選單 -->
                        <select 
                            v-model="searchField" 
                            @change="searchTerm = ''"
                            class="flex-shrink-0 w-full sm:w-auto p-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 ease-in-out"
                        >
                            <option value="entry">詞條</option>
                            <option value="gloss_chinese">中文釋義</option>
                            <option value="gloss_pinyin">拼音</option>
                        </select>
                        
                        <!-- 關鍵字輸入框 -->
                        <input
                            type="text"
                            v-model="searchTerm"
                            @keyup.enter="handleSearch"
                            placeholder="輸入關鍵字進行篩選..."
                            class="flex-grow w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 ease-in-out"
                        />

                        <!-- 篩選按鈕 -->
                        <button
                            @click="handleSearch"
                            class="w-full sm:w-auto px-6 py-3 bg-indigo-600 text-white font-medium rounded-lg shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition duration-150 ease-in-out"
                        >
                            篩選
                        </button>
                    </div>

                    <!-- 篩選結果顯示 -->
                    <template v-if="currentQuery.length > 0">
                        <div class="text-sm text-gray-500 mb-4">
                            已找到 <span class="font-semibold text-indigo-600">{{ filteredResults.length }}</span> 筆結果
                        </div>
                    </template>

                    <!-- 結果表格 -->
                    <div class="overflow-x-auto bg-gray-50 rounded-lg shadow-inner border border-gray-200">
                        <table v-if="filteredResults.length > 0" class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-indigo-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Entry</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Gloss Chinese</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Gloss Pinyin</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Note</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                <tr v-for="item in filteredResults" :key="item.entry" class="hover:bg-indigo-50 transition duration-100 ease-in-out">
                                    <!-- Entry (詞條) 欄位 - 加入音檔播放按鈕 -->
                                    <td class="px-6 py-4 font-medium text-gray-900 flex items-center whitespace-nowrap">
                                        <span class="mr-2">{{ item.entry }}</span>
                                        
                                        <!-- Audio Play Button -->
                                        <button 
                                            v-if="item.hashed_audio_file" 
                                            @click.stop="playAudio(item.hashed_audio_file)" 
                                            title="播放音檔"
                                            class="text-indigo-500 hover:text-indigo-700 focus:outline-none p-1 rounded-full hover:bg-indigo-100 transition duration-150 flex-shrink-0"
                                        >
                                            <!-- Speaker Icon (SVG) -->
                                            <svg fill="currentColor" viewBox="0 0 260 228" class="w-5 h-5">
                                                <path d="M170.81,78.043l15.653-15.653c14.848,12.299,24.323,30.868,24.323,51.61c0,21.04-9.757,39.836-24.974,52.128l-15.68-15.68
                                                    c11.291-8.184,18.655-21.469,18.655-36.448C188.786,99.32,181.719,86.262,170.81,78.043z M236,114
                                                    c0,28.068-12.569,53.253-32.371,70.231l15.584,15.584C242.982,178.82,258,148.133,258,114c0-33.836-14.757-64.286-38.168-85.265
                                                    L204.257,44.31C223.696,61.28,236,86.229,236,114z M146,2L56.4,66H2v96h54.4l89.6,64V2z"/>
                                            </svg>
                                        </button>
                                    </td>
                                    <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">{{ item.category }}</td>
                                    <td class="px-6 py-4 text-sm text-gray-700 whitespace-normal">{{ item.gloss_chinese }}</td>
                                    <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">{{ item.gloss_pinyin }}</td>
                                    <td class="px-6 py-4 text-sm text-gray-500 whitespace-normal">{{ item.note }}</td>
                                </tr>
                            </tbody>
                        </table>
                        <div v-else-if="currentQuery.length > 0" class="p-8 text-center text-gray-500">
                            沒有找到符合篩選條件 "<span class="font-semibold text-gray-600">{{ currentQuery }}</span>" 的結果。
                        </div>
                        <div v-else class="p-8 text-center text-gray-500">
                            請選擇欄位並輸入關鍵字開始檢索。
                        </div>
                    </div>
                </div>
                
                <!-- Lexicon 詞彙頁面 -->
                <div v-else-if="subPage === 'Lexicon'" class="bg-white p-6 sm:p-8 rounded-xl shadow-lg">
                    <h2 class="text-2xl font-semibold mb-6 text-gray-700">IPA</h2>
                    
                    <!-- Character Navigation Bar (子音導航列) -->
                    <div class="flex flex-wrap gap-2 p-3 bg-indigo-50 rounded-lg mb-6 shadow-inner justify-center">
                        <button
                            v-for="char in consonantOrder"
                            :key="char"
                            @click="setLexiconFilter(char)"
                            :class="{ 
                                'bg-indigo-600 text-white shadow-md ring-2 ring-indigo-300': currentLexiconFilter === char,
                                'bg-white text-gray-700 hover:bg-indigo-100': currentLexiconFilter !== char 
                            }"
                            class="px-3 py-1.5 font-bold text-lg rounded-md transition duration-150 ease-in-out border border-gray-200 text-sm sm:text-base"
                        >
                            {{ char }} <span class="text-xs">({{ groupedLexicon[char] ? groupedLexicon[char].length : 0 }})</span>
                        </button>
                    </div>

                    <!-- Lexicon Results -->
                    <div class="overflow-x-auto bg-gray-50 rounded-lg shadow-inner border border-gray-200">
                        <table v-if="filteredLexicon.length > 0" class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-indigo-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Entry</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Gloss Chinese</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Gloss Pinyin</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Note</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                <tr v-for="item in filteredLexicon" :key="item.entry" class="hover:bg-indigo-50 transition duration-100 ease-in-out">
                                    <!-- Entry (詞條) 欄位 - 加入音檔播放按鈕 -->
                                    <td class="px-6 py-4 font-medium text-gray-900 flex items-center whitespace-nowrap">
                                        <span class="mr-2">{{ item.entry }}</span>
                                        <button 
                                            v-if="item.hashed_audio_file" 
                                            @click.stop="playAudio(item.hashed_audio_file)" 
                                            title="播放音檔"
                                            class="text-indigo-500 hover:text-indigo-700 focus:outline-none p-1 rounded-full hover:bg-indigo-100 transition duration-150 flex-shrink-0"
                                        >
                                            <!-- Speaker Icon (SVG) -->
                                            <svg fill="currentColor" viewBox="0 0 260 228" class="w-5 h-5">
                                                <path d="M170.81,78.043l15.653-15.653c14.848,12.299,24.323,30.868,24.323,51.61c0,21.04-9.757,39.836-24.974,52.128l-15.68-15.68
                                                    c11.291-8.184,18.655-21.469,18.655-36.448C188.786,99.32,181.719,86.262,170.81,78.043z M236,114
                                                    c0,28.068-12.569,53.253-32.371,70.231l15.584,15.584C242.982,178.82,258,148.133,258,114c0-33.836-14.757-64.286-38.168-85.265
                                                    L204.257,44.31C223.696,61.28,236,86.229,236,114z M146,2L56.4,66H2v96h54.4l89.6,64V2z"/>
                                            </svg>
                                        </button>
                                    </td>
                                    <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">{{ item.category }}</td>
                                    <td class="px-6 py-4 text-sm text-gray-700 whitespace-normal">{{ item.gloss_chinese }}</td>
                                    <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">{{ item.gloss_pinyin }}</td>
                                    <td class="px-6 py-4 text-sm text-gray-500 whitespace-normal">{{ item.note }}</td>
                                </tr>
                            </tbody>
                        </table>
                        <div v-else class="p-8 text-center text-gray-500">
                            找不到以 "{{ currentLexiconFilter }}" 開頭的詞條。
                        </div>
                    </div>
                </div>
                
                <!-- Pinyin 拼音頁面 -->
                <div v-else-if="subPage === 'Pinyin'" class="bg-white p-6 sm:p-8 rounded-xl shadow-lg">
                    <h2 class="text-2xl font-semibold mb-6 text-gray-700">Pinyin</h2>
                    
                    <!-- Pinyin Navigation Bar (拼音導航列) -->
                    <div class="flex flex-wrap gap-2 p-3 bg-indigo-50 rounded-lg mb-6 shadow-inner justify-center">
                        <button
                            v-for="char in pinyinOrder"
                            :key="char"
                            @click="setPinyinFilter(char)"
                            :class="{ 
                                'bg-indigo-600 text-white shadow-md ring-2 ring-indigo-300': currentPinyinFilter === char,
                                'bg-white text-gray-700 hover:bg-indigo-100': currentPinyinFilter !== char 
                            }"
                            class="px-3 py-1.5 font-bold text-lg rounded-md transition duration-150 ease-in-out border border-gray-200 text-sm sm:text-base"
                        >
                            {{ char }} <span class="text-xs">({{ groupedPinyin[char] ? groupedPinyin[char].length : 0 }})</span>
                        </button>
                    </div>

                    <!-- Pinyin Results -->
                    <div class="overflow-x-auto bg-gray-50 rounded-lg shadow-inner border border-gray-200">
                        <table v-if="filteredPinyin.length > 0" class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-indigo-50">
                                <tr>
                                    <!-- 調整欄位順序：Gloss Pinyin, Gloss Chinese, Entry, Category, Note -->
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Gloss Pinyin</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Gloss Chinese</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Entry</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Note</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                <tr v-for="item in filteredPinyin" :key="item.entry" class="hover:bg-indigo-50 transition duration-100 ease-in-out">
                                    <!-- 調整欄位順序 -->
                                    <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">{{ item.gloss_pinyin }}</td>
                                    <td class="px-6 py-4 text-sm text-gray-700 whitespace-normal">{{ item.gloss_chinese }}</td>
                                    <td class="px-6 py-4 font-medium text-gray-900 flex items-center whitespace-nowrap">
                                        <span class="mr-2">{{ item.entry }}</span>
                                        <button 
                                            v-if="item.hashed_audio_file" 
                                            @click.stop="playAudio(item.hashed_audio_file)" 
                                            title="播放音檔"
                                            class="text-indigo-500 hover:text-indigo-700 focus:outline-none p-1 rounded-full hover:bg-indigo-100 transition duration-150 flex-shrink-0"
                                        >
                                            <!-- Speaker Icon (SVG) -->
                                            <svg fill="currentColor" viewBox="0 0 260 228" class="w-5 h-5">
                                                <path d="M170.81,78.043l15.653-15.653c14.848,12.299,24.323,30.868,24.323,51.61c0,21.04-9.757,39.836-24.974,52.128l-15.68-15.68
                                                    c11.291-8.184,18.655-21.469,18.655-36.448C188.786,99.32,181.719,86.262,170.81,78.043z M236,114
                                                    c0,28.068-12.569,53.253-32.371,70.231l15.584,15.584C242.982,178.82,258,148.133,258,114c0-33.836-14.757-64.286-38.168-85.265
                                                    L204.257,44.31C223.696,61.28,236,86.229,236,114z M146,2L56.4,66H2v96h54.4l89.6,64V2z"/>
                                            </svg>
                                        </button>
                                    </td>
                                    <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">{{ item.category }}</td>
                                    <td class="px-6 py-4 text-sm text-gray-500 whitespace-normal">{{ item.note }}</td>
                                </tr>
                            </tbody>
                        </table>
                        <div v-else class="p-8 text-center text-gray-500">
                            找不到以 "{{ currentPinyinFilter.toUpperCase() }}" 開頭的拼音詞條。
                        </div>
                    </div>
                </div>
                
                <!-- Categories 頁面 -->
                <div v-else-if="subPage === 'Categories'" class="bg-white p-6 sm:p-8 rounded-xl shadow-lg">
                    <h2 class="text-2xl font-semibold mb-6 text-gray-700">語意範疇</h2>
                    
                    <template v-if="categoryOrder.length > 0">
                        <!-- Category Navigation Bar (分類導航列) -->
                        <div class="flex flex-wrap gap-2 p-3 bg-indigo-50 rounded-lg mb-6 shadow-inner justify-center">
                            <button
                                v-for="category in categoryOrder"
                                :key="category"
                                @click="setCategoryFilter(category)"
                                :class="{ 
                                    'bg-indigo-600 text-white shadow-md ring-2 ring-indigo-300': currentCategoryFilter === category,
                                    'bg-white text-gray-700 hover:bg-indigo-100': currentCategoryFilter !== category 
                                }"
                                class="px-3 py-1.5 font-bold text-lg rounded-md transition duration-150 ease-in-out border border-gray-200 text-sm sm:text-base whitespace-nowrap"
                            >
                                {{ category }} <span class="text-xs">({{ groupedCategories[category] ? groupedCategories[category].length : 0 }})</span>
                            </button>
                        </div>

                        <!-- Category Results -->
                        <div class="overflow-x-auto bg-gray-50 rounded-lg shadow-inner border border-gray-200">
                            <table v-if="filteredCategories.length > 0" class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-indigo-50">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Entry</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Gloss Chinese</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Gloss Pinyin</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Note</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    <tr v-for="item in filteredCategories" :key="item.entry" class="hover:bg-indigo-50 transition duration-100 ease-in-out">
                                        <!-- Entry (詞條) 欄位 - 加入音檔播放按鈕 -->
                                        <td class="px-6 py-4 font-medium text-gray-900 flex items-center whitespace-nowrap">
                                            <span class="mr-2">{{ item.entry }}</span>
                                            <button 
                                                v-if="item.hashed_audio_file" 
                                                @click.stop="playAudio(item.hashed_audio_file)" 
                                                title="播放音檔"
                                                class="text-indigo-500 hover:text-indigo-700 focus:outline-none p-1 rounded-full hover:bg-indigo-100 transition duration-150 flex-shrink-0"
                                            >
                                                <!-- Speaker Icon (SVG) -->
                                            <svg fill="currentColor" viewBox="0 0 260 228" class="w-5 h-5">
                                                <path d="M170.81,78.043l15.653-15.653c14.848,12.299,24.323,30.868,24.323,51.61c0,21.04-9.757,39.836-24.974,52.128l-15.68-15.68
                                                    c11.291-8.184,18.655-21.469,18.655-36.448C188.786,99.32,181.719,86.262,170.81,78.043z M236,114
                                                    c0,28.068-12.569,53.253-32.371,70.231l15.584,15.584C242.982,178.82,258,148.133,258,114c0-33.836-14.757-64.286-38.168-85.265
                                                    L204.257,44.31C223.696,61.28,236,86.229,236,114z M146,2L56.4,66H2v96h54.4l89.6,64V2z"/>
                                            </svg>
                                            </button>
                                        </td>
                                        <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">{{ item.category }}</td>
                                        <td class="px-6 py-4 text-sm text-gray-700 whitespace-normal">{{ item.gloss_chinese }}</td>
                                        <td class="px-6 py-4 text-sm text-gray-500 whitespace-nowrap">{{ item.gloss_pinyin }}</td>
                                        <td class="px-6 py-4 text-sm text-gray-500 whitespace-normal">{{ item.note }}</td>
                                    </tr>
                                </tbody>
                            </table>
                            <div v-else class="p-8 text-center text-gray-500">
                                找不到屬於分類 "{{ currentCategoryFilter }}" 的詞條。
                            </div>
                        </div>
                    </template>
                    <template v-else>
                        <div class="p-8 text-center text-gray-500">
                            資料中未找到任何分類 (Category) 資訊。
                        </div>
                    </template>
                </div>
            </template>
        </template>
    </main>
</div>

<script>
const { ref, onMounted, computed } = Vue

// Helper function to parse CSV text into an array of objects
function parseCSV(text) {
    const [headerLine, ...dataLines] = text.trim().split('\n');
    if (!headerLine) return [];

    // 清理並獲取標頭
    const headers = headerLine.split(',').map(h => h.trim().replace(/"/g, ''));

    const data = dataLines.map(line => {
        // 簡單的 CSV 分割，處理可能存在的引號
        // 正則表達式: /,(?=(?:(?:[^"]*"){2})*[^"]*$)/g 用於分割逗號，但忽略雙引號內的逗號
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/g).map(v => v.trim().replace(/"/g, ''));

        return headers.reduce((obj, header, index) => {
            obj[header] = values[index] || '';
            return obj;
        }, {});
    }).filter(item => item.entry && item.entry.trim() !== ''); // 移除 entry 為空的項目
    
    return data;
}

const app = {
    setup() {
        const csvUrl = 'https://raw.githubusercontent.com/han-padahati/temp/refs/heads/main/output4.csv';
        const audioBaseUrl = 'https://raw.githubusercontent.com/han-padahati/Yongxing/main/audio/';

        // 定義語言列表 (首頁用)
        const availableLanguages = ref([
            { id: 'yongxing', name: 'Yongxing', description: '包含 IPA、拼音、語意範疇及搜尋功能。', color: 'indigo' },
            { id: 'another_a', name: '其他語言 A', description: '（尚未開放）', color: 'green' },
            { id: 'another_b', name: '其他語言 B', description: '（尚未開放）', color: 'red' },
        ]);
        
        // ====================================================
        // 主要應用程式狀態 (控制路由/視圖)
        // ====================================================
        const currentView = ref('LanguageSelect'); // 'LanguageSelect' (首頁) 或 'LexiconApp' (檢索系統)
        const currentLanguage = ref(null);

        const headerTitle = computed(() => {
            if (currentView.value === 'LanguageSelect') {
                return '檢索系統';
            }
            return currentLanguage.value ? `${currentLanguage.value.name} 詞彙檢索` : '詞彙檢索系統';
        });

        const selectLanguage = async (lang) => {
            if (lang.id === 'yongxing') {
                currentLanguage.value = lang;
                currentView.value = 'LexiconApp';
                // 進入檢索頁面後才開始載入資料
                await fetchData(); 

                if (data.value.length > 0) {
                    // Initialize Category filter if it hasn't been set
                    if (!currentCategoryFilter.value && categoryOrder.value.length > 0) {
                        currentCategoryFilter.value = categoryOrder.value[0];
                    }
                }
            } else {
                // 顯示未開放訊息 (這裡用 console log 模擬)
                console.log(`${lang.name} 尚未開放.`);
                // 實際應用中可以使用自訂 modal 顯示訊息
            }
        };

        // ====================================================
        // LexiconApp (永興語詞彙檢索) 狀態與邏輯
        // ====================================================
        
        // 定義 Lexicon (IPA) 的子音順序（首字列表）
        const consonantOrder = ['ʔ', 'ɓ', 'ɗ', 'h', 'k', 'kh', 'l', 'm', 'n', 'ŋ', 'ph', 's', 'tsh', 't', 'v', 'z'];
        // 優先檢查多字組的順序，確保 'tsh' 在 't' 之前檢查
        const prioritizedInitials = ['tsh', 'kh', 'ph', 'ʔ', 'ɓ', 'ɗ', 'h', 'k', 'l', 'm', 'n', 'ŋ', 's', 't', 'v', 'z'];

        // 定義 Pinyin 的首字順序
        const pinyinOrder = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h', 'j', 'k', 'l', 'm', 'n', 'p', 'q', 'r', 's', 't', 'w', 'x', 'y', 'z'];


        // State variables using Vue 3 Ref
        const data = ref([]);
        const isLoading = ref(false); // 初始為 false，在 selectLanguage 中觸發載入
        const error = ref(null);
        
        const subPage = ref('Search'); // 原本的 currentPage，現在改為 subPage
        
        // Search state
        const searchTerm = ref('');
        const searchField = ref('entry');
        const filteredResults = ref([]);
        const currentQuery = ref('');
        
        // Lexicon state
        const currentLexiconFilter = ref(consonantOrder[0]); // 預設為第一個子音 'ʔ'

        // Pinyin state
        const currentPinyinFilter = ref(pinyinOrder[0]); // 預設為第一個拼音 'a'

        // Categories state
        const currentCategoryFilter = ref(null);
        
        // Methods
        
        // 獲取並解析 CSV 資料
        const fetchData = async () => {
            isLoading.value = true;
            error.value = null;

            try {
                const response = await fetch(csvUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP 錯誤! 狀態碼: ${response.status}`);
                }

                const csvText = await response.text();
                const parsedData = parseCSV(csvText);
                
                data.value = parsedData;

            } catch (err) {
                console.error('Fetch or Parse Error:', err);
                error.value = err.message || '未知錯誤';
                data.value = [];
            } finally {
                isLoading.value = false;
            }
        };

        // 處理搜索邏輯
        const handleSearch = () => {
            const term = searchTerm.value.trim().toLowerCase();
            const field = searchField.value;
            
            if (term.length === 0) {
                filteredResults.value = [];
                currentQuery.value = '';
                return;
            }
            
            const results = data.value.filter(item => {
                const value = item[field]?.toString().toLowerCase() || '';
                return value.includes(term);
            });

            currentQuery.value = term;
            filteredResults.value = results;
        };

        // 播放音檔的邏輯
        const playAudio = (fileName) => {
            if (!fileName) return;

            // 為了讓瀏覽器能直接播放，需要使用 GitHub 的 raw 連結
            const fullAudioUrl = `${audioBaseUrl}${fileName}`;
            
            try {
                const audio = new Audio(fullAudioUrl);
                
                audio.play().catch(e => {
                    console.error("Audio play failed, possibly due to browser autoplay policy:", e);
                });
                
                audio.onerror = () => {
                    console.error('音檔載入或播放失敗:', fullAudioUrl);
                };

            } catch (e) {
                console.error("Error creating audio object:", e);
            }
        };
        
        // ----------------------------------------------------
        // LEXICON 詞彙 (IPA) 相關邏輯
        // ----------------------------------------------------
        
        // 找出詞條的開頭子音（處理多字組如 'tsh'）
        const getInitial = (entry) => {
            if (!entry) return null;
            const lowerEntry = entry.toLowerCase();
            
            // 依優先順序檢查
            for (const initial of prioritizedInitials) {
                if (lowerEntry.startsWith(initial)) {
                    return initial;
                }
            }
            return null; // 不符合任何定義的子音
        };

        // 將所有詞條按子音分組
        const groupedLexicon = computed(() => {
            const groups = {};
            
            // 初始化分組，確保所有定義的子音鍵都存在
            consonantOrder.forEach(char => groups[char] = []);

            data.value.forEach(item => {
                const initial = getInitial(item.entry);
                if (initial && groups[initial]) {
                    groups[initial].push(item);
                }
            });

            return groups;
        });

        // 根據當前選擇的子音篩選結果
        const filteredLexicon = computed(() => {
            return groupedLexicon.value[currentLexiconFilter.value] || [];
        });
        
        // 設定詞典的篩選子音
        const setLexiconFilter = (char) => {
            currentLexiconFilter.value = char;
        };

        // ----------------------------------------------------
        // PINYIN 拼音相關邏輯
        // ----------------------------------------------------

        // 找出拼音的首字母 (只取第一個字元)
        const getPinyinInitial = (pinyin) => {
            if (!pinyin) return null;
            // 移除可能存在的聲調符號，然後取第一個字元
            const cleanedPinyin = pinyin.toLowerCase().replace(/[āáǎàēéěèīíǐìōóǒòūúǔùüǖǘǚǜ]/g, (char) => {
                switch (char) {
                    case 'ā': case 'á': case 'ǎ': case 'à': return 'a';
                    case 'ē': case 'é': case 'ě': case 'è': return 'e';
                    case 'ī': case 'í': case 'ǐ': case 'ì': return 'i';
                    case 'ō': case 'ó': case 'ǒ': case 'ò': return 'o';
                    case 'ū': case 'ú': case 'ǔ': case 'ù': return 'u';
                    case 'ǖ': case 'ǘ': case 'ǚ': case 'ǜ': return 'v'; // 'ü' in pinyin is sometimes written as 'v'
                    default: return char;
                }
            });
            
            const initial = cleanedPinyin.charAt(0);
            return pinyinOrder.includes(initial) ? initial : null;
        };
        
        // 將所有詞條按拼音首字母分組
        const groupedPinyin = computed(() => {
            const groups = {};
            
            // 初始化分組，確保所有定義的拼音鍵都存在
            pinyinOrder.forEach(char => groups[char] = []);

            data.value.forEach(item => {
                const initial = getPinyinInitial(item.gloss_pinyin);
                if (initial && groups[initial]) {
                    groups[initial].push(item);
                }
            });

            return groups;
        });

        // 根據當前選擇的拼音篩選結果，並進行 A->Z 排序
        const filteredPinyin = computed(() => {
            const results = groupedPinyin.value[currentPinyinFilter.value] || [];
            
            // 根據 gloss_pinyin 進行 A->Z 排序
            return results.slice().sort((a, b) => {
                const pinyinA = a.gloss_pinyin.toLowerCase();
                const pinyinB = b.gloss_pinyin.toLowerCase();
                if (pinyinA < pinyinB) return -1;
                if (pinyinA > pinyinB) return 1;
                return 0;
            });
        });
        
        // 設定拼音的篩選字母
        const setPinyinFilter = (char) => {
            currentPinyinFilter.value = char;
        };


        // ----------------------------------------------------
        // CATEGORIES 分類相關邏輯
        // ----------------------------------------------------
        
        // 將所有詞條按 Category 分組
        const groupedCategories = computed(() => {
            const groups = {};
            data.value.forEach(item => {
                // 如果 category 欄位為空，可以歸類為 '未分類'
                const category = item.category && item.category.trim() !== '' ? item.category.trim() : '未分類';
                if (!groups[category]) {
                    groups[category] = [];
                }
                groups[category].push(item);
            });
            return groups;
        });

        // 獲取分類名稱的排序列表
        const categoryOrder = computed(() => {
            // 取得所有分類名稱並按字母順序排序
            return Object.keys(groupedCategories.value).sort();
        });

        // 根據當前選擇的 Category 篩選結果
        const filteredCategories = computed(() => {
            if (!currentCategoryFilter.value) return [];
            return groupedCategories.value[currentCategoryFilter.value] || [];
        });
        
        // 設定 Category 的篩選
        const setCategoryFilter = (category) => {
            currentCategoryFilter.value = category;
        };

        // ----------------------------------------------------
        
        return {
            // Main App State
            currentView,
            currentLanguage,
            availableLanguages,
            headerTitle,
            selectLanguage,

            // Data & Loading
            data,
            isLoading,
            error,
            subPage, // Lexicon subpage (formerly currentPage)
            
            // Search
            searchTerm,
            searchField,
            filteredResults,
            currentQuery,
            handleSearch,
            
            // Lexicon
            consonantOrder,
            currentLexiconFilter,
            groupedLexicon,
            filteredLexicon,
            setLexiconFilter,

            // Pinyin
            pinyinOrder,
            currentPinyinFilter,
            groupedPinyin,
            filteredPinyin,
            setPinyinFilter,

            // Categories
            currentCategoryFilter,
            groupedCategories,
            filteredCategories,
            categoryOrder,
            setCategoryFilter,
            
            // Utility
            playAudio,
        };
    }
};

Vue.createApp(app).mount('#app');
</script>
