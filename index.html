<script>
const { ref, onMounted, computed } = Vue

// Helper function to parse CSV text into an array of objects
function parseCSV(text) {
    const [headerLine, ...dataLines] = text.trim().split('\n');
    if (!headerLine) return [];

    // 清理並獲取標頭
    const headers = headerLine.split(',').map(h => h.trim().replace(/"/g, ''));

    const data = dataLines.map(line => {
        // 簡單的 CSV 分割，處理可能存在的引號
        // 正則表達式: /,(?=(?:(?:[^"]*"){2})*[^"]*$)/g 用於分割逗號，但忽略雙引號內的逗號
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/g).map(v => v.trim().replace(/"/g, ''));

        return headers.reduce((obj, header, index) => {
            obj[header] = values[index] || '';
            return obj;
        }, {});
    }).filter(item => item.entry && item.entry.trim() !== ''); // 移除 entry 為空的項目
    
    return data;
}

const app = {
    setup() {
        const csvUrl = 'https://raw.githubusercontent.com/han-padahati/temp/refs/heads/main/output4.csv';
        const audioBaseUrl = 'https://raw.githubusercontent.com/han-padahati/Yongxing/main/audio/';

        // 定義詞典的子音順序（首字列表）
        const consonantOrder = ['ʔ', 'ɓ', 'ɗ', 'h', 'k', 'kh', 'l', 'm', 'n', 'ŋ', 'ph', 's', 'tsh', 't', 'v', 'z'];
        // 優先檢查多字組的順序，確保 'tsh' 在 't' 之前檢查
        const prioritizedInitials = ['tsh', 'kh', 'ph', 'ʔ', 'ɓ', 'ɗ', 'h', 'k', 'l', 'm', 'n', 'ŋ', 's', 't', 'v', 'z'];


        // State variables using Vue 3 Ref
        const data = ref([]);
        const isLoading = ref(true);
        const error = ref(null);
        
        const currentPage = ref('Search');
        
        // Search state
        const searchTerm = ref('');
        const searchField = ref('entry');
        const filteredResults = ref([]);
        const currentQuery = ref('');
        
        // Lexicon state
        const currentLexiconFilter = ref(consonantOrder[0]); // 預設為第一個子音 'ʔ'

        // Categories state
        const currentCategoryFilter = ref(null);
        
        // Methods
        
        // 獲取並解析 CSV 資料
        const fetchData = async () => {
            isLoading.value = true;
            error.value = null;

            try {
                const response = await fetch(csvUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP 錯誤! 狀態碼: ${response.status}`);
                }

                const csvText = await response.text();
                const parsedData = parseCSV(csvText);
                
                data.value = parsedData;

            } catch (err) {
                console.error('Fetch or Parse Error:', err);
                error.value = err.message || '未知錯誤';
                data.value = [];
            } finally {
                isLoading.value = false;
            }
        };

        // 處理搜索邏輯
        const handleSearch = () => {
            const term = searchTerm.value.trim().toLowerCase();
            const field = searchField.value;
            
            if (term.length === 0) {
                filteredResults.value = [];
                currentQuery.value = '';
                return;
            }
            
            const results = data.value.filter(item => {
                const value = item[field]?.toString().toLowerCase() || '';
                return value.includes(term);
            });

            currentQuery.value = term;
            filteredResults.value = results;
        };

        // 播放音檔的邏輯
        const playAudio = (fileName) => {
            if (!fileName) return;

            // 為了讓瀏覽器能直接播放，需要使用 GitHub 的 raw 連結
            const fullAudioUrl = `${audioBaseUrl}${fileName}`;
            
            try {
                const audio = new Audio(fullAudioUrl);
                
                audio.play().catch(e => {
                    console.error("Audio play failed, possibly due to browser autoplay policy:", e);
                });
                
                audio.onerror = () => {
                    console.error('音檔載入或播放失敗:', fullAudioUrl);
                };

            } catch (e) {
                console.error("Error creating audio object:", e);
            }
        };
        
        // ----------------------------------------------------
        // LEXICON 詞彙相關邏輯
        // ----------------------------------------------------
        
        // 找出詞條的開頭子音（處理多字組如 'tsh'）
        const getInitial = (entry) => {
            if (!entry) return null;
            const lowerEntry = entry.toLowerCase();
            
            // 依優先順序檢查
            for (const initial of prioritizedInitials) {
                if (lowerEntry.startsWith(initial)) {
                    return initial;
                }
            }
            return null; // 不符合任何定義的子音
        };

        // 將所有詞條按子音分組
        const groupedLexicon = computed(() => {
            const groups = {};
            
            // 初始化分組，確保所有定義的子音鍵都存在
            consonantOrder.forEach(char => groups[char] = []);

            data.value.forEach(item => {
                const initial = getInitial(item.entry);
                if (initial && groups[initial]) {
                    groups[initial].push(item);
                }
            });

            return groups;
        });

        // 根據當前選擇的子音篩選結果
        const filteredLexicon = computed(() => {
            return groupedLexicon.value[currentLexiconFilter.value] || [];
        });
        
        // 設定詞典的篩選子音
        const setLexiconFilter = (char) => {
            currentLexiconFilter.value = char;
        };

        // ----------------------------------------------------
        // CATEGORIES 分類相關邏輯
        // ----------------------------------------------------
        
        // 將所有詞條按 Category 分組
        const groupedCategories = computed(() => {
            const groups = {};
            data.value.forEach(item => {
                // 如果 category 欄位為空，可以歸類為 '未分類'
                const category = item.category && item.category.trim() !== '' ? item.category.trim() : '未分類';
                if (!groups[category]) {
                    groups[category] = [];
                }
                groups[category].push(item);
            });
            return groups;
        });

        // 獲取分類名稱的排序列表
        const categoryOrder = computed(() => {
            // 取得所有分類名稱並按字母順序排序
            return Object.keys(groupedCategories.value).sort();
        });

        // 根據當前選擇的 Category 篩選結果
        const filteredCategories = computed(() => {
            if (!currentCategoryFilter.value) return [];
            return groupedCategories.value[currentCategoryFilter.value] || [];
        });
        
        // 設定 Category 的篩選
        const setCategoryFilter = (category) => {
            currentCategoryFilter.value = category;
        };

        // ----------------------------------------------------
        
        // 顯示選中欄位的中文名稱
        const getFieldName = (field) => {
            switch (field) {
                case 'entry': return 'Entry (詞條)';
                case 'gloss_chinese': return 'Gloss Chinese (中文釋義)';
                case 'gloss_pinyin': return 'Gloss Pinyin (拼音)';
                default: return '';
            }
        };

        // 顯示頁面的中文名稱
        const getPageTitle = (page) => {
            switch (page) {
                case 'Lexicon': return '詞彙';
                case 'Categories': return '分類';
                default: return '';
            }
        };

        // Lifecycle hook: 在組件掛載後載入資料
        onMounted(async () => {
            await fetchData();

            if (data.value.length > 0) {
                // Initialize Category filter if it hasn't been set
                if (!currentCategoryFilter.value && categoryOrder.value.length > 0) {
                    currentCategoryFilter.value = categoryOrder.value[0];
                }
            }
        });

        return {
            // Data & Loading
            data,
            isLoading,
            error,
            currentPage,
            
            // Search
            searchTerm,
            searchField,
            filteredResults,
            currentQuery,
            handleSearch,
            
            // Lexicon
            consonantOrder,
            currentLexiconFilter,
            groupedLexicon,
            filteredLexicon,
            setLexiconFilter,

            // Categories
            currentCategoryFilter,
            groupedCategories,
            filteredCategories,
            categoryOrder,
            setCategoryFilter,
            
            // Utility
            playAudio,
            getFieldName,
            getPageTitle,
        };
    }
};

Vue.createApp(app).mount('#app');
</script>

</body>
</html>
